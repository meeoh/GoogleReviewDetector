<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 16px;
      color: #fff;
      flex: 1;
    }
    .header .logo {
      font-size: 24px;
    }
    .settings-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .settings-btn:hover { color: #fff; border-color: #555; }
    .desc {
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .status {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .status.active { border-color: #00c853; }
    .status.inactive { border-color: #ff5252; }
    .ai-status {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ai-status.enabled { border-color: #7c4dff; }
    .ai-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ai-configure {
      color: #7c4dff;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      text-decoration: underline;
    }
    .ai-configure:hover { color: #b388ff; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot.green { background: #00c853; }
    .dot.red { background: #ff5252; }
    .dot.purple { background: #7c4dff; }
    .dot.gray { background: #555; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #c81e45; }
    .btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🕵️</span>
    <h1>Review Detective</h1>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>
  <p class="desc">
    Navigate to any Google Maps business page, then click "Analyze Reviews"
    to scan for fake and bot reviews.
  </p>
  <div class="status" id="status">
    <span class="dot red" id="statusDot"></span>
    <span id="statusText">Checking page...</span>
  </div>
  <div class="ai-status" id="aiStatus">
    <span class="ai-label">
      <span class="dot gray" id="aiDot"></span>
      <span id="aiText">AI: checking...</span>
    </span>
    <button class="ai-configure" id="aiConfigure">configure</button>
  </div>
  <button class="btn" id="analyzeBtn" disabled>Analyze Reviews</button>
  <div class="footer">
    Heuristic analysis runs locally. AI analysis (optional) sends review text to OpenAI.
  </div>

  <script src="popup.js"></script>
</body>
</html>
